###############################################################
# HPA — Investigator Agent
#
# WHY MEMORY-LED SCALING:
#   The investigator's bottleneck is LLM token throughput and the
#   in-memory message history that grows with each ReAct tool call.
#   A single deep investigation (parse → read → grep → git → context)
#   can accumulate 50k+ tokens in memory before returning.
#   Memory pressure appears before CPU saturates.
#
#   Scale profile:  2 → 6 replicas
#   Primary metric: Memory > 65%
#   Secondary:      CPU   > 70%
###############################################################
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: investigator-hpa
  namespace: debug-agent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: investigator
  minReplicas: 2
  maxReplicas: 6
  metrics:
    # Primary: memory — grows with LLM context window accumulation
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 65

    # Secondary: CPU — rises when multiple tool calls overlap
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30     # scale up quickly (investigations queue up)
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60              # add up to 2 pods/min (burst of errors)
    scaleDown:
      stabilizationWindowSeconds: 600    # wait 10 min — investigations may be in-flight
      policies:
        - type: Pods
          value: 1
          periodSeconds: 180             # conservative scale-down
---
###############################################################
# HPA — Fixer Agent
#
# WHY CPU-LED SCALING:
#   The fixer's bottleneck is the `dotnet build` subprocess.
#   Each build attempt spikes ALL cores to 100% for 10-30 seconds.
#   With 3 max attempts, a single fix cycle can spike CPU 3 times.
#   CPU saturates long before memory does.
#
#   Scale profile:  1 → 4 replicas
#   Primary metric: CPU   > 55%  (lower threshold — build spikes are sharp)
#   Secondary:      Memory > 70%
###############################################################
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fixer-hpa
  namespace: debug-agent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fixer
  minReplicas: 1                         # fixes are sequential per error; 1 is fine at idle
  maxReplicas: 4
  metrics:
    # Primary: CPU — driven by dotnet build subprocess
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 55         # lower than investigator — build spikes are sharp

    # Secondary: memory — LLM context for write→build→retry loop
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 45
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60              # add 1 fixer at a time — each needs full dotnet SDK
    scaleDown:
      stabilizationWindowSeconds: 300    # wait for active builds to finish before scaling down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
