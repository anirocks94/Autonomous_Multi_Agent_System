# IMPORTANT: Replace placeholder values below with your actual secrets.
# To create:  kubectl apply -f k8s/secret.yaml
# Better practice: use Azure Key Vault + CSI driver (see deployment guide).
apiVersion: v1
kind: Secret
metadata:
  name: debug-agent-secrets
  namespace: debug-agent
type: Opaque
stringData:
  AZURE_OPENAI_ENDPOINT: "https://<YOUR-RESOURCE>.cognitiveservices.azure.com/"
  AZURE_OPENAI_API_KEY: "<YOUR-KEY>"
  AZURE_OPENAI_DEPLOYMENT: "gpt-4o"
  AZURE_OPENAI_API_VERSION: "2024-08-01-preview"

  AZURE_DEVOPS_ORG: "https://dev.azure.com/<YOUR-ORG>"
  AZURE_DEVOPS_PROJECT: "<YOUR-PROJECT>"
  AZURE_DEVOPS_REPO: "<YOUR-REPO>"
  AZURE_DEVOPS_PAT: "<YOUR-PAT>"

  AZURE_BLOB_CONNECTION_STRING: "DefaultEndpointsProtocol=https;AccountName=<ACCOUNT>;AccountKey=<KEY>;EndpointSuffix=core.windows.net"
  AZURE_BLOB_CONTAINER: "exceptions"

  TEAMS_WEBHOOK_URL: ""
  LANGSMITH_API_KEY: ""
  LANGSMITH_TRACING: "false"
  LANGSMITH_PROJECT: "autonomous-debug-agent"
  LANGSMITH_ENDPOINT: "https://api.smith.langchain.com"
