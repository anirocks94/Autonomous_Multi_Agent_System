###############################################################
# Fixer Agent — Deployment
# Resource profile: CPU-BURSTY
#   LLM calls PLUS `dotnet build` execution inside the container
#   Build spikes: short, high-CPU bursts (compile entire project)
#   After build: CPU drops back to near-zero between retries
# Scale trigger: CPU > 55% (build bursts) AND Memory > 70%
###############################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fixer
  namespace: debug-agent
  labels:
    app: fixer
    tier: agent
spec:
  replicas: 1                   # fewer base replicas — fixes are sequential per error
  selector:
    matchLabels:
      app: fixer
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: fixer
        tier: agent
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001

      containers:
        - name: fixer
          image: <YOUR-ACR>.azurecr.io/fixer:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8002

          envFrom:
            - secretRef:
                name: debug-agent-secrets

          env:
            - name: WORKING_DIR
              value: "/app/workspace"
            - name: SQLITE_DB_PATH
              value: "/app/data/workflows.db"
            - name: MAX_ATTEMPTS
              value: "3"
            - name: CONFIDENCE_THRESHOLD
              value: "0.6"

          volumeMounts:
            - name: agent-data
              mountPath: /app/data
              subPath: data
            - name: agent-data
              mountPath: /app/workspace
              subPath: workspace

          # ── Resource Profile: CPU-bursty ──────────────────────────
          # dotnet build spikes CPU to 2+ cores for ~10-30s per attempt
          # 3 retries max = up to 3 build cycles per fix invocation
          resources:
            requests:
              cpu: "1000m"        # higher base CPU than investigator
              memory: "2Gi"       # dotnet build + LLM context
            limits:
              cpu: "4000m"        # allow high burst for dotnet build
              memory: "4Gi"

          # Longer startup needed: dotnet build warm-up on first run
          startupProbe:
            httpGet:
              path: /health
              port: 8002
            failureThreshold: 30   # 30x5s = 150s startup window
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10     # build can block the process briefly
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

      volumes:
        - name: agent-data
          persistentVolumeClaim:
            claimName: debug-agent-data

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: fixer
---
apiVersion: v1
kind: Service
metadata:
  name: fixer-svc
  namespace: debug-agent
  labels:
    app: fixer
spec:
  type: ClusterIP
  selector:
    app: fixer
  ports:
    - name: http
      protocol: TCP
      port: 8002
      targetPort: 8002
