###############################################################
# Ingress — Azure Application Gateway Ingress Controller (AGIC)
# Prerequisites:
#   1. AKS cluster with AGIC addon enabled
#   2. cert-manager + Let's Encrypt ClusterIssuer (TLS)
#   3. Replace <YOUR-DOMAIN> with actual domain
#
# If using NGINX Ingress instead, change the annotation to:
#   kubernetes.io/ingress.class: nginx
###############################################################
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: debug-agent-ingress
  namespace: debug-agent
  annotations:
    kubernetes.io/ingress.class: azure/application-gateway
    appgw.ingress.kubernetes.io/ssl-redirect: "true"
    appgw.ingress.kubernetes.io/connection-draining: "true"
    appgw.ingress.kubernetes.io/connection-draining-timeout: "30"
    appgw.ingress.kubernetes.io/request-timeout: "300"    # long timeout for LLM calls
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - debug-agent.<YOUR-DOMAIN>.com
      secretName: debug-agent-tls
  rules:
    - host: debug-agent.<YOUR-DOMAIN>.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: debug-agent-svc
                port:
                  number: 80
